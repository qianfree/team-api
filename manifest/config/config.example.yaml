# Team-API Runtime Configuration

# Server
server:
  address:     ":18888"
  serverAgent: "team-api"
  dumpRouterMap: false

# Logger
logger:
  level:  "all"
  stdout: true
  ctxKeys: ["RequestId"]

# Database (PostgreSQL)
database:
  default:
    type:     "pgsql"
    link:     "pgsql:<user>:<password>@tcp(<host>:<port>)/<database>?sslmode=disable"
    timezone: "Asia/Shanghai"
    debug:    false
    dryRun:   false
    maxIdle:  10
    maxOpen:  100
    maxLifetime: "30s"

# Redis
redis:
  default:
    address: "<host>:<port>"
    db:      0

# Cache (GoFrame built-in, uses Redis as adapter)
cache:
  default:
    adapter: "redis"

# JWT Authentication
jwt:
  secret:          "<change-me-to-a-random-secret>"
  accessTokenExpire:  "12h"
  refreshTokenExpire: "7d"
  issuer:          "team-api"
  adminMaxSessions:  5
  tenantMaxSessions: 10

# Crypto (AES-256 encryption key, 32 bytes hex-encoded = 64 hex chars)
crypto:
  encryptionKey: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"

# Email SMTP (fallback defaults, override via opt_options or env vars)
email:
  smtp:
    host:     ""
    port:     587
    username: ""
    password: ""
    from:     ""

# Channel proxy (for accessing Google/Anthropic etc. from China)
channel_proxy_url: ""
